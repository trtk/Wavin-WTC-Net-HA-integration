name: Hibajelentés
description: Hiba jelentése a Wavin WTC-3 integrációhoz
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Hiba leírása
      description: Írd le, mi történt és mit vártál volna.
    validations:
      required: true
  - type: input
    id: integration_version
    attributes:
      label: Integráció verzió
      placeholder: "1.0.0"
    validations:
      required: true
  - type: input
    id: ha_version
    attributes:
      label: Home Assistant verzió
      placeholder: "2026.6.x"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Log részlet
      render: text
